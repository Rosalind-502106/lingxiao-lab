<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>凌逍科学社团 · 资产库</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a1a;
    overflow: hidden;
    padding: 16px;
  }

  /* ===== 科技网格背景 ===== */
  .grid-bg {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(99,102,241,.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,.08) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridScroll 20s linear infinite;
  }
  @keyframes gridScroll {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-60px, -60px); }
  }

  /* ===== 动态光晕 ===== */
  .orb {
    position: fixed; border-radius: 50%; filter: blur(100px); z-index: 0; pointer-events: none;
  }
  .orb:nth-child(1) {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(99,102,241,.3), transparent);
    top: -20%; left: -15%;
    animation: orbFloat1 15s ease-in-out infinite;
  }
  .orb:nth-child(2) {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(168,85,247,.25), transparent);
    bottom: -15%; right: -15%;
    animation: orbFloat2 18s ease-in-out infinite;
  }
  .orb:nth-child(3) {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(245,158,11,.2), transparent);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: orbFloat3 12s ease-in-out infinite;
  }
  @keyframes orbFloat1 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(60px, 40px); }
  }
  @keyframes orbFloat2 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-50px, -30px); }
  }
  @keyframes orbFloat3 {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.2); }
  }

  /* ===== 主体卡片 ===== */
  .cover {
    position: relative; z-index: 1;
    width: 100%; max-width: 520px;
    background: linear-gradient(145deg, rgba(15,15,40,.85), rgba(10,10,30,.9));
    backdrop-filter: blur(20px);
    border-radius: 32px;
    padding: 48px 36px 40px;
    text-align: center;
    box-shadow:
      0 0 60px rgba(99,102,241,.15),
      inset 0 1px 0 rgba(255,255,255,.06);
    border: 1px solid rgba(99,102,241,.15);
    animation: coverIn .8s cubic-bezier(.16,1,.3,1);
  }
  @keyframes coverIn {
    from { opacity: 0; transform: translateY(40px) scale(.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ===== 顶部标志 ===== */
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(99,102,241,.12);
    border: 1px solid rgba(99,102,241,.2);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 12px; font-weight: 600;
    color: rgba(255,255,255,.6);
    margin-bottom: 28px;
  }
  .badge .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #22c55e; animation: pulseDot 2s infinite;
  }
  @keyframes pulseDot { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }

  /* ===== Logo 图标 ===== */
  .logo {
    width: 100px; height: 100px; margin: 0 auto 20px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 28px;
    display: flex; align-items: center; justify-content: center;
    font-size: 48px;
    box-shadow: 0 8px 32px rgba(99,102,241,.35);
    position: relative;
    animation: logoFloat 4s ease-in-out infinite;
  }
  @keyframes logoFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .logo::after {
    content: ''; position: absolute; inset: -3px;
    border-radius: 31px;
    background: linear-gradient(135deg, rgba(99,102,241,.4), rgba(139,92,246,.2));
    z-index: -1;
    animation: logoPulse 3s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0%, 100% { opacity: .5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  /* ===== 装饰性轨道 ===== */
  .orbit-ring {
    position: absolute;
    width: 180px; height: 180px;
    border: 1px solid rgba(99,102,241,.1);
    border-radius: 50%;
    top: -40px; left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
  }
  .orbit-ring::before {
    content: ''; position: absolute;
    width: 8px; height: 8px;
    background: rgba(99,102,241,.4);
    border-radius: 50%;
    top: -4px; left: 50%;
    animation: orbitSpin 6s linear infinite;
  }
  .orbit-ring::after {
    content: ''; position: absolute;
    width: 5px; height: 5px;
    background: rgba(168,85,247,.4);
    border-radius: 50%;
    bottom: -2.5px; left: 30%;
    animation: orbitSpin 6s linear infinite reverse;
  }
  @keyframes orbitSpin {
    from { transform: rotate(0deg) translateX(90px) rotate(0deg); }
    to { transform: rotate(360deg) translateX(90px) rotate(-360deg); }
  }

  /* ===== 主标题 ===== */
  .title {
    font-size: 28px; font-weight: 800;
    background: linear-gradient(135deg, #e0e7ff, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
    letter-spacing: 2px;
  }
  .subtitle {
    font-size: 13px;
    color: rgba(255,255,255,.35);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 24px;
    font-weight: 400;
  }

  /* ===== 装饰分割 ===== */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 24px;
  }
  .divider::before,
  .divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(99,102,241,.3), transparent);
  }

  /* ===== 描述文字 ===== */
  .desc {
    color: rgba(255,255,255,.5);
    font-size: 14px; line-height: 1.7;
    margin-bottom: 8px;
  }

  /* ===== 统计信息 ===== */
  .stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    margin: 24px 0;
  }
  .stat-item {
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.05);
    border-radius: 14px;
    padding: 14px 8px;
    transition: all .3s;
  }
  .stat-item .icon { font-size: 24px; margin-bottom: 4px; }
  .stat-item .num {
    font-size: 20px; font-weight: 700;
    background: linear-gradient(135deg, #c7d2fe, #e0e7ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-item .label {
    font-size: 11px; color: rgba(255,255,255,.35);
    margin-top: 2px;
  }

  /* ===== 特性标签 ===== */
  .features {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-bottom: 28px;
  }
  .feature-tag {
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 20px;
    background: rgba(99,102,241,.08);
    border: 1px solid rgba(99,102,241,.12);
    color: rgba(255,255,255,.45);
  }

  /* ===== 进入按钮 ===== */
  .enter-btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 16px 48px;
    border: none; border-radius: 16px;
    font-size: 18px; font-weight: 700; font-family: inherit;
    cursor: pointer;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    box-shadow: 0 4px 20px rgba(99,102,241,.4);
    transition: all .3s;
    position: relative;
    overflow: hidden;
    text-decoration: none;
  }
  .enter-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,.1) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform .6s;
  }
  .enter-btn:hover::before { transform: translateX(100%); }
  .enter-btn:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 8px 30px rgba(99,102,241,.5);
  }
  .enter-btn:active {
    transform: translateY(0) scale(.98);
    box-shadow: 0 2px 10px rgba(99,102,241,.3);
  }
  .enter-btn .arrow {
    font-size: 20px;
    transition: transform .3s;
  }
  .enter-btn:hover .arrow { transform: translateX(4px); }

  /* ===== 页脚 ===== */
  .footer {
    margin-top: 24px;
    font-size: 12px;
    color: rgba(255,255,255,.2);
    letter-spacing: 1px;
  }
  .footer .highlight {
    color: rgba(99,102,241,.4);
  }

  /* ===== 粒子 ===== */
  .particles {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 3px; height: 3px;
    background: rgba(99,102,241,.4);
    border-radius: 50%;
    animation: particleFloat linear infinite;
  }
  @keyframes particleFloat {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* ===== 响应式 ===== */
  @media (max-width: 420px) {
    .cover { padding: 36px 24px 32px; }
    .title { font-size: 24px; }
    .logo { width: 80px; height: 80px; font-size: 38px; }
    .enter-btn { padding: 14px 36px; font-size: 16px; }
    .stats { gap: 6px; }
    .stat-item { padding: 10px 6px; }
    .stat-item .num { font-size: 18px; }
  }
  @media (min-width: 640px) {
    .cover { padding: 56px 48px 48px; }
    .title { font-size: 32px; }
  }
</style>
</head>
<body>

<!-- 背景 -->
<div class="grid-bg"></div>
<div class="orb"></div>
<div class="orb"></div>
<div class="orb"></div>

<!-- 粒子 -->
<div class="particles" id="particles"></div>

<!-- 封面卡片 -->
<div class="cover">
  <div class="orbit-ring"></div>

  <!-- 标志 -->
  <div class="badge">
    <span class="dot"></span>
    系统在线 · v2.1
  </div>

  <!-- Logo -->
  <div class="logo">🔬</div>

  <!-- 标题 -->
  <div class="title">凌逍科学社团</div>
  <div class="subtitle">Lingxiao Science Club · 资产库</div>

  <div class="divider"></div>

  <!-- 描述 -->
  <div class="desc">
    实验室物资智能管理系统 · 支持多设备数据云端同步，随时随地进行物资管理
  </div>

  <!-- 统计 -->
  <div class="stats">
    <div class="stat-item">
      <div class="icon">📦</div>
      <div class="num" id="sItems">--</div>
      <div class="label">物资种类</div>
    </div>
    <div class="stat-item">
      <div class="icon">📤</div>
      <div class="num" id="sBorrows">--</div>
      <div class="label">借出中</div>
    </div>
    <div class="stat-item">
      <div class="icon">✅</div>
      <div class="num" id="sAvailable">--</div>
      <div class="label">可借用</div>
    </div>
  </div>

  <!-- 特性 -->
  <div class="features">
    <span class="feature-tag">🔗 多端同步</span>
    <span class="feature-tag">💾 自动保存</span>
    <span class="feature-tag">📊 实时统计</span>
    <span class="feature-tag">🔐 管理员模式</span>
    <span class="feature-tag">📤 数据导出</span>
  </div>

  <!-- 进入按钮 -->
  <a class="enter-btn" href="lingxiao-lab-manager.html">
    进入资产库
    <span class="arrow">→</span>
  </a>

  <div class="footer">
    Powered by <span class="highlight">Lingxiao Lab</span> · 凌逍科学社团
  </div>
</div>

<script>
// ===== 生成粒子 =====
(function() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.width = p.style.height = (1 + Math.random() * 3) + 'px';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.opacity = .2 + Math.random() * .4;
    container.appendChild(p);
  }
})();

// ===== 从服务器加载统计数据 =====
(async function() {
  try {
    const res = await fetch('/api/data', { cache: 'no-store' });
    if (res.ok) {
      const data = await res.json();
      const items = data.items || [];
      const borrows = data.borrows || [];

      // 计算可借用数量
      const borrowedList = borrows.filter(b => !b.returned);
      let available = 0;
      items.forEach(item => {
        const borrowed = borrowedList.filter(b => b.itemId === item.id).reduce((s, b) => s + (Number(b.qty) || 0), 0);
        available += Math.max(0, (Number(item.total) || 0) - borrowed);
      });

      document.getElementById('sItems').textContent = items.length;
      document.getElementById('sBorrows').textContent = borrowedList.length;
      document.getElementById('sAvailable').textContent = available;
    }
  } catch (e) {
    // 加载失败，显示占位符
    document.getElementById('sItems').textContent = '0';
    document.getElementById('sBorrows').textContent = '0';
    document.getElementById('sAvailable').textContent = '0';
  }
})();
</script>

</body>
</html>
